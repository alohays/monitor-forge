name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate manifests
        run: npx tsx forge/bin/forge.ts build --skip-vite --format json

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Validate config
        run: npx tsx forge/bin/forge.ts validate --format json

      - name: Build
        run: npx tsx forge/bin/forge.ts build --format json

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
