name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate manifests
        run: npx tsx forge/bin/forge.ts build --skip-vite --format json

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Validate config
        run: npx tsx forge/bin/forge.ts validate --format json

      - name: List presets
        run: npx tsx forge/bin/forge.ts preset list --format json

      - name: Validate all presets
        run: |
          for preset in presets/*.json; do
            name=$(basename "$preset" .json)
            echo "::group::Validating preset: $name"
            npx tsx forge/bin/forge.ts init --template "$name" --force --format json
            npx tsx forge/bin/forge.ts validate --format json
            echo "::endgroup::"
          done

      - name: Build
        run: npx tsx forge/bin/forge.ts build --format json
