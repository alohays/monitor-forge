name: Bug Report
description: Report a bug in monitor-forge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `npm run forge -- ...`
        2. Open the dashboard
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: validate-output
    attributes:
      label: Forge Validate Output
      description: "Paste the output of: `npm run forge -- validate --format json`"
      render: json

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g., 20.11.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15, Ubuntu 24.04, Windows 11"
